document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

border:1.5px solid rgba(90,60,30,.35);pointer-events:none}\n    .book-dropcap{float:left;font:400 52px var(--font-heading);color:#6b4f2e;line-height:.8;margin:2px 8px 0 0}\n    .book-pagenum{position:absolute;bottom:16px;left:0;right:0;text-align:center;font:italic 400 12px var(--font-body);color:#8B6B3D;opacity:.7}\n    .book-title{font:400 25px var(--font-heading);color:#4A3626;text-align:center;margin-top:14px;line-height:1.25}\n    .page-flower{position:absolute;z-index:0;pointer-events:none}\n    .book-p{font:400 17px/1.75 var(--font-body);color:#4A3626}\n    .book-word{color:#8B6B3D !important;border-bottom-color:rgba(139,107,61,.5) !important}\n  <\u002Fstyle>\n  <template id=\"__bundler_thumbnail\">\n    <svg sc-camel-view-box=\"0 0 200 200\" xmlns=\"http://www.w3.org/2000/svg\">\n      <rect width=\"200\" height=\"200\" fill=\"#F0D877\"><\u002Frect>\n      <path d=\"M50 70 L100 110 L150 70\" stroke=\"#A15A82\" stroke-width=\"8\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n      <rect x=\"45\" y=\"60\" width=\"110\" height=\"90\" rx=\"10\" fill=\"none\" stroke=\"#93CDDB\" stroke-width=\"6\"><\u002Frect>\n    <\u002Fsvg>\n  <\u002Ftemplate>\n<\u002Fhelmet>\n\n<section class=\"dv-turn\" id=\"final\">\n  <div class=\"dv-card\">\n        <div class=\"phone-frame frame-book\">\n          <div class=\"phone-notch\"><\u002Fdiv>\n          <div class=\"phone-viewport\" data-variant=\"4a-book\">\n            <div class=\"book-stack\">\n\n              <div class=\"book-page\" style=\"z-index:6\">\n                <div class=\"book-border\"><\u002Fdiv>\n                <div style=\"text-align:center;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;box-sizing:border-box\">\n                  <div class=\"date\" style=\"color:#8B6B3D\">25 de julio de 2026<\u002Fdiv>\n                  <div class=\"book-title\">Con mucho cariño para<br>Allison Vargas<\u002Fdiv>\n                  <svg class=\"divider-brush\" sc-camel-view-box=\"0 0 130 16\" style=\"margin:26px auto\"><path d=\"M4 8 Q 32 -3, 65 8 T 126 8\" stroke=\"#8B6B3D\" stroke-width=\"3.5\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.6\"><\u002Fpath><\u002Fsvg>\n                  <p style=\"font:italic 400 15px var(--font-body);color:#6b4f2e;opacity:.75;margin-top:30px\">Arrastra para pasar la página<\u002Fp>\n                <\u002Fdiv>\n                <svg class=\"page-flower\" style=\"top:20px;left:18px;width:70px;height:70px;opacity:.16\" sc-camel-view-box=\"0 0 70 70\">\n                  <g fill=\"#8B6B3D\">\n                    <ellipse cx=\"35\" cy=\"15\" rx=\"10\" ry=\"16\"><\u002Fellipse>\n                    <ellipse cx=\"35\" cy=\"15\" rx=\"10\" ry=\"16\" transform=\"rotate(60 35 35)\"><\u002Fellipse>\n                    <ellipse cx=\"35\" cy=\"15\" rx=\"10\" ry=\"16\" transform=\"rotate(120 35 35)\"><\u002Fellipse>\n                    <ellipse cx=\"35\" cy=\"15\" rx=\"10\" ry=\"16\" transform=\"rotate(180 35 35)\"><\u002Fellipse>\n                    <ellipse cx=\"35\" cy=\"15\" rx=\"10\" ry=\"16\" transform=\"rotate(240 35 35)\"><\u002Fellipse>\n                    <ellipse cx=\"35\" cy=\"15\" rx=\"10\" ry=\"16\" transform=\"rotate(300 35 35)\"><\u002Fellipse>\n                    <circle cx=\"35\" cy=\"35\" r=\"7\" fill=\"#C9962C\"><\u002Fcircle>\n                  <\u002Fg>\n                <\u002Fsvg>\n                <div class=\"book-pagenum\">1<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"book-page\" style=\"z-index:5;display:flex;flex-direction:column\">\n                <div class=\"book-border\"><\u002Fdiv>\n                <p class=\"letter-p book-p\"><span class=\"book-dropcap\">N<\u002Fspan>o todas las páginas son fáciles de escribir, pero algunas terminan convirtiéndose en las más importantes. Esas en las que aprendemos, crecemos y descubrimos nuestra propia fuerza.<\u002Fp>\n                <div class=\"washed book-photo\" style=\"height:130px\">\n                  <image-slot id=\"foto-4a-a\" shape=\"rounded\" radius=\"6\" placeholder=\"Foto rectangular\"><\u002Fimage-slot>\n                <\u002Fdiv>\n                <p class=\"letter-p book-p\" style=\"margin-top:14px\">Me alegra que tu <span class=\"word book-word\" data-word=\"historia\">historia<\u002Fspan> haya seguido adelante, porque en algún momento me regaló el privilegio de formar parte de ella. De ser un pequeño detalle en tu narrativa, de verte navegar la vida con gracia y determinación.<\u002Fp>\n                <svg class=\"page-flower\" style=\"bottom:56px;right:14px;width:60px;height:60px;opacity:.16\" sc-camel-view-box=\"0 0 60 60\">\n                  <g fill=\"none\" stroke=\"#6b7a3f\" stroke-width=\"2\">\n                    <path d=\"M30 50 C20 40, 18 20, 30 10 C42 20, 40 40, 30 50 Z\"><\u002Fpath>\n                    <path d=\"M30 50 C15 45, 8 30, 15 15\"><\u002Fpath>\n                    <path d=\"M30 50 C45 45, 52 30, 45 15\"><\u002Fpath>\n                  <\u002Fg>\n                <\u002Fsvg>\n                <div class=\"book-pagenum\">2<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"book-page\" style=\"z-index:4\">\n                <div class=\"book-border\"><\u002Fdiv>\n                <p class=\"letter-p book-p\"><span class=\"book-dropcap\">E<\u002Fspan>res una persona increíble, llena de sueños y de una esencia que brilla cada vez que la reconozco. Estoy encantado de conocerte y siento una emoción genuina por seguir haciéndolo, por descubrir más de quién eres cada día. Siempre recuerdo la primera vez que nos conocimos —esa interacción que fue tan leve, tan natural—, y ahora que conozco la maravilla de persona que eres, me doy cuenta de que hubiera querido acercarme mucho más desde ese primer momento. Porque no sabía entonces lo que sé ahora: que vales infinitamente más de lo que cualquiera podría imaginar.<\u002Fp>\n                <svg class=\"page-flower\" style=\"top:22px;right:18px;width:64px;height:64px;opacity:.15\" sc-camel-view-box=\"0 0 64 64\">\n                  <path d=\"M32 32 C20 30, 18 18, 30 14 C42 12, 48 22, 40 30 C34 36, 24 34, 24 26 C24 20, 30 18, 34 22\" fill=\"none\" stroke=\"#A8555F\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath>\n                <\u002Fsvg>\n                <div class=\"book-pagenum\">3<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"book-page\" style=\"z-index:3;display:flex;align-items:center;justify-content:center\">\n                <div class=\"book-border\"><\u002Fdiv>\n                <div style=\"text-align:center;position:relative;z-index:2\">\n                  <svg class=\"divider-brush\" sc-camel-view-box=\"0 0 130 16\" style=\"margin:0 auto 18px\"><path d=\"M4 8 Q 32 18, 65 8 T 126 8\" stroke=\"#8B6B3D\" stroke-width=\"3.5\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.6\"><\u002Fpath><\u002Fsvg>\n                  <p class=\"letter-p\" style=\"font:400 30px var(--font-heading);color:#4A3626;margin:0\">Feliz cumpleaños.<\u002Fp>\n                  <svg class=\"divider-brush\" sc-camel-view-box=\"0 0 130 16\" style=\"margin:18px auto 0\"><path d=\"M4 8 Q 32 -3, 65 8 T 126 8\" stroke=\"#8B6B3D\" stroke-width=\"3.5\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.6\"><\u002Fpath><\u002Fsvg>\n                  <button class=\"sparkle-btn\" data-role=\"sparkle\" aria-label=\"destellos\" style=\"color:#8B6B3D;margin:32px auto 0;display:flex;flex-direction:column;align-items:center;gap:6px\">\n                    <svg width=\"34\" height=\"34\" sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z\"><\u002Fpath><\u002Fsvg>\n                    <span style=\"font:italic 400 12px var(--font-body);opacity:.7\">toca aquí<\u002Fspan>\n                  <\u002Fbutton>\n                  <svg sc-camel-view-box=\"0 0 160 30\" style=\"width:150px;margin:22px auto 0;opacity:.55\">\n                    <path d=\"M6 6 C40 26, 60 2, 80 14 C100 circle>\n                <\u002Fsvg>\n                <div class=\"book-pagenum\">4<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"book-page\" style=\"z-index:2;display:flex;flex-direction:column\">\n                <div class=\"book-border\"><\u002Fdiv>\n                <p class=\"letter-p book-p\"><span class=\"book-dropcap\">E<\u002Fspan>spero que los <span class=\"word book-word\" data-word=\"capitulos\">capítulos<\u002Fspan> que vienen estén llenos de <span class=\"word book-word\" data-word=\"paz\">paz<\u002Fspan>, sonrisas auténticas y personas que siempre te recuerden lo valiosa que eres. Que cada nuevo año te traiga sorpresas hermosas, amistades profundas, y la certeza de que lo mejor todavía está por escribirse.<\u002Fp>\n                <div class=\"washed book-photo\" style=\"height:160px\">\n                  <image-slot id=\"foto-4a-b\" shape=\"rounded\" radius=\"6\" placeholder=\"Otra foto rectangular\"><\u002Fimage-slot>\n                <\u002Fdiv>\n                <svg class=\"page-flower\" style=\"top:18px;left:16px;width:66px;height:50px;opacity:.15\" sc-camel-view-box=\"0 0 66 50\">\n                  <g fill=\"#8B6B3D\">\n                    <circle cx=\"14\" cy=\"30\" r=\"6\"><\u002Fcircle><circle cx=\"26\" cy=\"18\" r=\"7\"><\u002Fcircle><circle cx=\"40\" cy=\"26\" r=\"6\"><\u002Fcircle>\n                    <circle cx=\"14\" cy=\"30\" r=\"2.5\" fill=\"#C9962C\"><\u002Fcircle><circle cx=\"26\" cy=\"18\" r=\"3\" fill=\"#C9962C\"><\u002Fcircle><circle cx=\"40\" cy=\"26\" r=\"2.5\" fill=\"#C9962C\"><\u002Fcircle>\n                  <\u002Fg>\n                <\u002Fsvg>\n                <div class=\"book-pagenum\">5<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"book-page\" style=\"z-index:1;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center\">\n                <div class=\"book-border\"><\u002Fdiv>\n                <svg class=\"page-flower\" style=\"bottom:70px;right:14px;width:72px;height:72px;opacity:.16\" sc-camel-view-box=\"0 0 72 72\">\n                  <path d=\"M10 62 C25 50, 40 40, 62 12\" stroke=\"#6b4f2e\" stroke-width=\"2\" fill=\"none\"><\u002Fpath>\n                  <circle cx=\"45\" cy=\"34\" r=\"6\" fill=\"#A8555F\"><\u002Fcircle>\n                  <circle cx=\"55\" cy=\"22\" r=\"5\" fill=\"#A8555F\"><\u002Fcircle>\n                  <circle cx=\"20\" cy=\"52\" r=\"5\" fill=\"#A8555F\"><\u002Fcircle>\n                <\u002Fsvg>\n                <div class=\"closing\" style=\"color:#4A3626;margin-top:24px\">Con todo mi amor,<\u002Fdiv>\n                <div class=\"signature\" style=\"color:#4A3626\">Luis Robles<\u002Fdiv>\n                <svg sc-camel-view-box=\"0 0 90 90\" style=\"width:64px;height:64px;margin:10px auto 0;display:block;filter:drop-shadow(0 2px 3px rgba(0,0,0,.25))\">\n                  <circle cx=\"45\" cy=\"45\" r=\"40\" fill=\"#8B3A3A\"><\u002Fcircle>\n                  <circle cx=\"45\" cy=\"45\" r=\"40\" fill=\"none\" stroke=\"#6E2727\" stroke-width=\"1.5\"><\u002Fcircle>\n                  <path d=\"M45 8 C20 12,12 20,8 45 C12 70,20 78,45 82 C70 78,78 70,82 45 C78 20,70 12,45 8Z\" fill=\"none\" stroke=\"#A85252\" stroke-width=\"1\" opacity=\".5\"><\u002Fpath>\n                  <text x=\"45\" y=\"53\" text-anchor=\"middle\" font-family=\"var(--font-heading)\" font-size=\"30\" fill=\"#E8C98A\">L<\u002Ftext>\n                <\u002Fsvg>\n                <div class=\"icon-row\">\n                  <button class=\"heart-btn\" data-role=\"heart\" aria-label=\"corazón\" style=\"color:#8B3A3A\">\n                    <svg width=\"32\" height=\"32\" sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 21s-7.5-4.6-10-9.3C.6 8.6 2 5 5.4 5c1.9 0 3.3 1 4.6 2.6C11.3 6 12.7 5 14.6 5 18 5 19.4 8.6 22 11.7 19.5 16.4 12 21 12 21z\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                  <span aria-hidden=\"true\" style=\"color:#8B6B3D\">\n                    <svg width=\"28\" height=\"28\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M4 20 L15 9\"><\u002Fpath><rect x=\"14\" y=\"4\" width=\"6\" height=\"6\" rx=\"1.5\" transform=\"rotate(45 17 7)\"><\u002Frect><\u002Fsvg>\n                  <\u002Fspan>\n                  <button class=\"sparkle-btn\" data-role=\"sparkle\" aria-label=\"destellos\" style=\"color:#8B6B3D\">\n                    <svg width=\"28\" height=\"28\" sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                <\u002Fdiv>\n                <div class=\"footer-note\" style=\"color:#6b5540\">~ Cada momento contigo es una obra de arte ~<\u002Fdiv>\n                <div class=\"book-pagenum\">6<\u002Fdiv>\n              <\u002Fdiv>\n\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this.rootEl().querySelectorAll('.phone-viewport').forEach((el) => {\n      if (el.querySelector('.book-stack')) this.wireBook(el);\n      else this.wireOne(el);\n    });\n  }\n\n  wireBook(root) {\n    const pages = Array.from(root.querySelectorAll('.book-page'));\n    const stack = root.querySelector('.book-stack');\n    const FLIP_DEG = -165;\n    const EASE = '1.6s cubic-bezier(.65,0,.35,1), box-shadow 1.6s';\n    let idx = 0;\n\n    const render = () => {\n      pages.forEach((p, i) => {\n        p.style.transition = EASE;\n        p.style.transform = `rotateY(${i < idx ? FLIP_DEG : 0}deg)`;\n        p.classList.toggle('flipped', i < idx);\n      });\n    };\n    render();\n    const next = () => { if (idx < pages.length - 1) { idx++; render(); } };\n    const prev = () => { if (idx > 0) { idx--; render(); } };\n\n    let dragging = false, suppressClick = false, activePage = null, dragDir = 0;\n    let startX = 0, startY = 0, startTime = 0, lastX = 0, lastTime = 0, velocity = 0;\n\n    const onDown = (e) => {\n      if (e.target.closest('[data-word],[data-role]')) return;\n      startX = lastX = e.clientX; startY = e.clientY;\n      startTime = lastTime = performance.now();\n      velocity = 0;\n      dragging = false; activePage = null; dragDir = 0;\n      root.setPointerCapture && root.setPointerCapture(e.pointerId);\n    };\n\n    const beginDrag = (dirGuess) => {\n      dragDir = dirGuess;\n      activePage = dragDir > 0 ? pages[idx] : pages[idx - 1];\n      if (!activePage) { dragDir = 0; return false; }\n      dragging = true; suppressClick = true;\n      stack.classList.add('dragging');\n      activePage.style.transition = 'none';\n      return true;\n    };\n\n    const applyDrag = (clientX) => {\n      const width = Math.max(root.clientWidth, 1);\n      const dx = clientX - startX;\n      let progress;\n      if (dragDir > 0) { progress = Math.min(Math.max(-dx / width, 0), 1); activePage.style.transform = `rotateY(${FLIP_DEG * progress}deg)`; }\n      else { progress = Math.min(Math.max(dx / width, 0), 1); activePage.style.transform = `rotateY(${FLIP_DEG * (1 - progress)}deg)`; }\n      return progress;\n    };\n\n    const onMove = (e) => {\n      if (dragDir === 0 && !dragging) {\n        const dx = e.clientX - startX, dy = e.clientY - startY;\n        if (Math.abs(dx) < 8 || Math.abs(dx) < Math.abs(dy)) return;\n        if (!beginDrag(dx < 0 ? 1 : -1)) return;\n      }\n      if (!dragging) return;\n      e.preventDefault();\n      const now = performance.now();\n      const dt = now - lastTime;\n      if (dt > 0) velocity = (e.clientX - lastX) / dt;\n      lastX = e.clientX; lastTime = now;\n      applyDrag(e.clientX);\n    };\n\n    const onUp = (e) => {\n      if (!dragging) { dragDir = 0; return; }\n      const width = Math.max(root.clientWidth, 1);\n      const progress = dragDir > 0\n        ? Math.min(Math.max(-(e.clientX - startX) / width, 0), 1)\n        : Math.min(Math.max((e.clientX - startX) / width, 0), 1);\n      const fastFlick = Math.abs(velocity) > 0.5;\n      const commit = progress > 0.32 || (fastFlick && ((dragDir > 0 && velocity < 0) || (dragDir < 0 && velocity > 0)));\n      if (commit) { if (dragDir > 0) idx++; else idx--; }\n      dragging = false; dragDir = 0;\n      stack.classList.remove('dragging');\n      requestAnimationFrame(render);\n      setTimeout(() => { suppressClick = false; }, 50);\n    };\n\n    root.addEventListener('pointerdown', onDown);\n    root.addEventListener('pointermove', onMove);\n    root.addEventListener('pointerup', onUp);\n    root.addEventListener('pointercancel', onUp);\n\n    root.addEventListener('click', (e) => {\n      if (suppressClick) { e.preventDefault(); e.stopPropagation(); return; }\n      const wordEl = e.target.closest('[data-word]');\n      if (wordEl) { this.triggerWordEffect(wordEl, root); return; }\n      const heartEl = e.target.closest('[data-role=\"heart\"]');\n      if (heartEl) { this.handleHeartTap(heartEl, root); return; }\n      const sparkleEl = e.target.closest('[data-role=\"sparkle\"]');\n      if (sparkleEl) { this.burstConfetti(root); return; }\n    });\n\n    let pressTimer = null;\n    root.addEventListener('pointerdown', (e) => {\n      const p = e.target.closest('.letter-p');\n      if (!p) return;\n      pressTimer = setTimeout(() => {\n        p.classList.add('lp-glow');\n        setTimeout(() => p.classList.remove('lp-glow'), 800);\n      }, 500);\n    });\n    root.addEventListener('pointerup', () => clearTimeout(pressTimer));\n    root.addEventListener('pointerleave', () => clearTimeout(pressTimer));\n\n    let motionRequested = false;\n    root.addEventListener('pointerdown', () => {\n      if (motionRequested) return;\n      motionRequested = true;\n      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {\n        DeviceMotionEvent.requestPermission().then((state) => {\n          if (state === 'granted') this.setupShake(root);\n        }).catch(() => {});\n      } else {\n        this.setupShake(root);\n      }\n    }, { once: true });\n  }\n\n  rootEl() {\n    return this._root || (this._root = document.body);\n  }\n\n  wireOne(root) {\n    const scroller = root.querySelector('.phone-scroll');\n    const blobLayer = root.querySelector('.blob-layer');\n\n    scroller.addEventListener('scroll', () => {\n      blobLayer.style.transform = `translateY(${scroller.scrollTop * 0.08}px)`;\n    });\n\n    scroller.addEventListener('click', (e) => {\n      const wordEl = e.target.closest('[data-word]');\n      if (wordEl) this.triggerWordEffect(wordEl, root);\n      const heartEl = e.target.closest('[data-role=\"heart\"]');\n      if (heartEl) this.handleHeartTap(heartEl, root);\n      const sparkleEl = e.target.closest('[data-role=\"sparkle\"]');\n      if (sparkleEl) this.burstConfetti(root);\n    });\n\n    let pressTimer = null;\n    const startPress = (e) => {\n      const p = e.target.closest('.letter-p');\n      if (!p) return;\n      pressTimer = setTimeout(() => {\n        p.classList.add('lp-glow');\n        setTimeout(() => p.classList.remove('lp-glow'), 800);\n      }, 500);\n    };\n    const cancelPress = () => clearTimeout(pressTimer);\n    scroller.addEventListener('pointerdown', startPress);\n    scroller.addEventListener('pointerup', cancelPress);\n    scroller.addEventListener('pointerleave', cancelPress);\n\n    let motionRequested = false;\n    root.addEventListener('pointerdown', () => {\n      if (motionRequested) return;\n      motionRequested = true;\n      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {\n        DeviceMotionEvent.requestPermission().then((state) => {\n          if (state === 'granted') this.setupShake(root);\n        }).catch(() => {});\n      } else {\n        this.setupShake(root);\n      }\n    }, { once: true });\n  }\n\n  setupShake(root) {\n    let last = null;\n    let lastShake = 0;\n    window.addEventListener('devicemotion', (ev) => {\n      const a = ev.accelerationIncludingGravity || ev.acceleration;\n      if (!a || a.x === null) return;\n      const now = Date.now();\n      if (last) {\n        const delta = Math.abs(a.x - last.x) + Math.abs(a.y - last.y) + Math.abs(a.z - last.z);\n        if (delta > 25 && now - lastShake > 1200) {\n          lastShake = now;\n          this.burstConfetti(root);\n        }\n      }\n      last = { x: a.x, y: a.y, z: a.z };\n    });\n  }\n\n  triggerWordEffect(el, root) {\n    const word = el.dataset.word;\n    if (word === 'historia') this.ringBurst(el, root);\n    else if (word === 'paz') this.calmAura(el);\n    else if (word === 'capitulos') this.pageFlip(el);\n  }\n\n  fxLayer(root) {\n    return root.querySelector('.phone-scroll') || root;\n  }\n\n  fxScrollTop(root) {\n    const s = root.querySelector('.phone-scroll');\n    return s ? s.scrollTop : 0;\n  }\n\n  ringBurst(el, root) {\n    const rect = el.getBoundingClientRect();\n    const prect = root.getBoundingClientRect();\n    const layer = this.fxLayer(root);\n    const ring = document.createElement('div');\n    ring.className = 'fx-ring';\n    ring.style.left = (rect.left - prect.left + rect.width / 2) + 'px';\n    ring.style.top = (rect.top - prect.top + rect.height / 2 + this.fxScrollTop(root)) + 'px';\n    layer.appendChild(ring);\n    setTimeout(() => ring.remove(), 1000);\n    el.classList.add('word-glow');\n    setTimeout(() => el.classList.remove('word-glow'), 600);\n  }\n\n  calmAura(el) {\n    el.classList.add('word-breathe');\n    setTimeout(() => el.classList.remove('word-breathe'), 2000);\n  }\n\n  pageFlip(el) {\n    el.classList.add('word-flip');\n    setTimeout(() => el.classList.remove('word-flip'), 800);\n  }\n\n  handleHeartTap(el, root) {\n    const now = Date.now();\n    const last = Number(el.dataset.lastTap || 0);\n    el.dataset.lastTap = String(now);\n    if (now - last < 350) {\n      el.classList.add('heart-beat');\n      setTimeout(() => el.classList.remove('heart-beat'), 800);\n      this.petalRain(root);\n    }\n  }\n\n  petalRain(root) {\n    const layer = this.fxLayer(root);\n    const baseTop = this.fxScrollTop(root);\n    for (let i = 0; i < 14; i++) {\n      const p = document.createElement('div');\n      p.className = 'fx-petal';\n      p.style.left = (10 + Math.random() * 80) + '%';\n      p.style.top = baseTop + 'px';\n      p.style.animationDelay = (Math.random() * 0.4) + 's';\n      layer.appendChild(p);\n      setTimeout(() => p.remove(), 2600);\n    }\n  }\n\n  burstConfetti(root) {\n    const layer = this.fxLayer(root);\n    const baseTop = this.fxScrollTop(root);\n    const colors = ['var(--color-accent-500)', 'var(--color-accent-2-500)', 'var(--color-accent-300)', 'var(--color-accent-2-300)', '#8B6B3D', '#C9962C'];\n    const shapes = ['square', 'circle', 'triangle', 'ribbon'];\n    for (let i = 0; i < 46; i++) {\n      const c = document.createElement('div');\n      c.className = 'fx-confetti';\n      const shape = shapes[i % shapes.length];\n      const size = 6 + Math.random() * 5;\n      c.style.left = (Math.random() * 100) + '%';\n      c.style.top = baseTop + 'px';\n      c.style.background = colors[i % colors.length];\n      c.style.animationDelay = (Math.random() * 0.4) + 's';\n      c.style.width = size + 'px';\n      c.style.height = (shape === 'ribbon' ? size * 2.2 : size) + 'px';\n      if (shape === 'circle') c.style.borderRadius = '50%';\n      else if (shape === 'triangle') { c.style.background = 'transparent'; c.style.borderLeft = (size / 2) + 'px solid transparent'; c.style.borderRight = (size / 2) + 'px solid transparent'; c.style.borderBottom = size + 'px solid ' + colors[i % colors.length]; c.style.width = '0'; c.style.height = '0'; }\n      else if (shape === 'ribbon') c.style.borderRadius = '3px';\n      else c.style.borderRadius = '2px';\n      layer.appendChild(c);\n      setTimeout(() => c.remove(), 3200);\n    }\n  }\n\n  renderVals() {\n    return {};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
